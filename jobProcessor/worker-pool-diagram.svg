<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Worker pool pattern with jobs and results channels</title>
<desc>A jobs channel feeds three worker goroutines, which fan in to a results channel. A close coordinator waits for all workers to finish before closing the results channel.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="25" y="40" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="60" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">jobs channel</text>
<text x="105" y="78" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">receive-only</text>

<line x1="105" y1="96" x2="105" y2="118" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="105" y1="118" x2="535" y2="118" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="105" y1="118" x2="105" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="320" y1="118" x2="320" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="535" y1="118" x2="535" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="30" y="140" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="105" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">worker 1</text>
<text x="105" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">processes jobs</text>

<rect x="245" y="140" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="320" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">worker 2</text>
<text x="320" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">processes jobs</text>

<rect x="460" y="140" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="535" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">worker 3</text>
<text x="535" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">processes jobs</text>

<line x1="105" y1="196" x2="105" y2="218" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="320" y1="196" x2="320" y2="218" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="535" y1="196" x2="535" y2="218" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="105" y1="218" x2="535" y2="218" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="320" y1="218" x2="320" y2="238" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="240" y="240" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="320" y="260" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">results channel</text>
<text x="320" y="278" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">collects output</text>

<path d="M490 320 L490 308 L320 308 L320 298" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="380" y="320" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="490" y="340" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">close coordinator</text>
<text x="490" y="358" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">closes results channel</text>
</svg>
